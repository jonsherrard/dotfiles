# ─── General ──────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g set-titles on
set -g set-titles-string "#S · #W"
set -g focus-events on

# Faster escape
set -sg escape-time 10

# ─── Theme (dark, cmux-inspired) ─────────────────────────
# Status bar
set -g status-position bottom
set -g status-style "bg=#1a1b26,fg=#a9b1d6"
set -g status-left-length 30
set -g status-right-length 60
set -g status-left "#[fg=#7aa2f7,bold] #S #[fg=#3b4261]│ "
set -g status-right "#[fg=#3b4261]│ #[fg=#a9b1d6]%H:%M "

# Window list in status bar (compact, for mobile)
set -g window-status-format "#[fg=#565f89] #I·#W "
set -g window-status-current-format "#[fg=#7aa2f7,bold] #I·#W "
set -g window-status-separator ""

# Pane borders
set -g pane-border-style "fg=#3b4261"
set -g pane-active-border-style "fg=#7aa2f7"

# Message styling
set -g message-style "bg=#1a1b26,fg=#7aa2f7"

# ─── Prefix ──────────────────────────────────────────────
# Keep default Ctrl+b prefix

# ─── Sidebar (cmux-style vertical tabs) ─────────────────
# Toggle sidebar with prefix+Tab
bind Tab run-shell "bash ~/.tmux/scripts/toggle-sidebar.sh"

# Navigate windows (preserves sidebar across switches)
bind -r j run-shell "bash ~/.tmux/scripts/nav-window.sh next"
bind -r k run-shell "bash ~/.tmux/scripts/nav-window.sh prev"

# ─── Pane management ─────────────────────────────────────
# Vertical split (side by side, like cmux)
bind v split-window -h -c "#{pane_current_path}"
bind s split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# Navigate panes with vim keys
bind h select-pane -L
bind l select-pane -R
bind -r C-j select-pane -D
bind -r C-k select-pane -U

# Resize panes
bind -r H resize-pane -L 3
bind -r L resize-pane -R 3
bind -r J resize-pane -D 3
bind -r K resize-pane -U 3

# ─── Hooks (ensure sidebar + refresh) ────────────────────
set-hook -g window-unlinked      "run-shell 'bash ~/.tmux/scripts/notify-sidebar.sh'"
set-hook -g window-renamed       "run-shell 'bash ~/.tmux/scripts/notify-sidebar.sh'"
set-hook -g pane-focus-in        "run-shell 'bash ~/.tmux/scripts/notify-sidebar.sh'"
set-hook -g client-focus-in      "run-shell 'bash ~/.tmux/scripts/ensure-sidebar.sh; bash ~/.tmux/scripts/notify-sidebar.sh'"
set-hook -g after-new-window     "run-shell 'bash ~/.tmux/scripts/ensure-sidebar.sh; bash ~/.tmux/scripts/notify-sidebar.sh'"

# ─── Auto sidebar for wide terminals ────────────────────
# On new session: if terminal is wide enough, auto-open sidebar
# (Commented out - enable if you want auto-open)
# set-hook -g session-created "run-shell 'bash ~/.tmux/scripts/toggle-sidebar.sh'"

# ─── Mobile-friendly ────────────────────────────────────
# When attaching from a narrow terminal (e.g. phone), the sidebar
# won't open. The status bar window list serves as navigation.
# Use: tmux attach -t <session> from any terminal.

# ─── Copy mode (vim-style) ──────────────────────────────
setw -g mode-keys vi
bind Enter copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# ─── Reload config ──────────────────────────────────────
bind r source-file ~/.tmux.conf \; display-message "Config reloaded"
